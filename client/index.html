<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="register-container">
        <form action="#" id="register-form" method="post">
            <div class="form-item">
                <label for="register-user-first-name-input">First name
                    <input type="text" id="register-user-first-name-input" name="first_name" placeholder="First name" required>
                </label>
            </div>

            <div class="form-item">
                <label for="register-user-last-name-input">Last name
                    <input type="text" id="register-user-last-name-input" name="last_name" placeholder="Last name" required>
                </label>
            </div>

            <div class="form-item">
                <label for="register-user-pass-input">Password
                    <input type="text" id="register-user-pass-input" name="password" placeholder="Strong password" required>
                </label>
            </div>

            <div class="form-item">
                <label for="register-user-age-input">Age
                    <input type="number" id="register-user-age-input" min="0" name="age" placeholder="Age" required>
                </label>
            </div>

            <div class="form-item">
                <label for="register-user-gender-input">Gender
                    <input type="text" id="register-user-gender-input" name="gender" placeholder="Gender" required>
                </label>
            </div>
            <button id="register-user-submit-button" type="submit">Register</button>
        </form>
    </div>
</body>
<script src="index.js" type="module"></script>
</html>
